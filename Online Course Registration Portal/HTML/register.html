<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../CSS/register.css" />
  </head>
  <body style="background-color: rgb(209, 214, 219)">
    <header>
      <div
        class="d-flex align-items-center bg justify-content-center p-3"
        style="background-color: rgba(145, 47, 22, 0.957)"
      >
        <img
          src="../Images/cvrLogo.png"
          alt="logo"
          class="img-fluid"
          style="max-width: 100px"
        />
        <h1 class="display-4 strong text-light ms-3">
          CVR College Of Engineering
        </h1>
      </div>
      <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
          <!-- <a class="navbar-brand" href="#">Navbar</a> -->
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="home.html"
                  >Home</a
                >
              </li>
              <li class="nav-item dropdown">
                <a
                  class="nav-link dropdown-toggle active"
                  href="#"
                  role="button"
                  data-bs-toggle="dropdown"
                  aria-expanded="false"
                >
                  Courses
                </a>
                <ul class="dropdown-menu">
                  <li><a class="dropdown-item" href="#">FSD</a></li>
                  <li><a class="dropdown-item" href="#">DS</a></li>
                  <li><a class="dropdown-item" href="#">AIML</a></li>
                </ul>
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="about.html">About</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="#">Contact Us</a>
              </li>
            </ul>
            <button
              class="btn btn-dark p-2"
              style="width: 100px"
              onclick="window.location.href = 'register.html'"
            >
              Login
            </button>
          </div>
        </div>
      </nav>
    </header>
    <main>
      <div class="container bg-light p-5 rounded" style="width: 50%">
        <h3 class="mb-3">Registration Page</h3>
        <form class="needs-validation">
          <div class="mb-3 form-floating">
            <input
              type="text"
              class="form-control"
              id="name"
              placeholder="Enter your name"
              required
            />
            <label for="name" class="form-label fw-bold">Student Name</label>
            <div class="invalid-feedback">Please Enter your name.</div>
          </div>
          <div class="mb-3 form-floating">
            <input
              type="email"
              class="form-control"
              id="email"
              placeholder="Enter your email"
              required
            />
            <label for="email" class="form-label fw-bold">Email address</label>
          </div>
          <div class="mb-3 form-floating">
            <input
              type="tel"
              class="form-control"
              id="phno"
              placeholder="Enter your mobile number"
              required
            />
            <label for="phno" class="form-label fw-bold">Mobile Number</label>
            <div class="invalid-feedback">Please Enter your mobile number.</div>
          </div>
          <div class="mb-3 form-floating">
            <select class="form-control" id="gender" required>
              <option value="" disabled selected>Gender</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
            </select>
            <label for="gender" class="form-label fw-bold">Gender</label>
          </div>
          <div class="mb-3 form-floating">
            <select class="form-control" id="course" required>
              <option value="" disabled selected>Select Course</option>
              <option value="webdev">Web Development</option>
              <option value="pyp">Python Programming</option>
              <option value="ds">Data Science</option>
              <option value="aiml">AI & Machine Learning</option>
              <option value="java">Java Programming</option>
              <option value="cc">Cloud Computing</option>
            </select>
            <label for="course" class="form-label fw-bold">Course</label>
          </div>
          <div class="mb-3 form-floating">
            <input
              class="form-control"
              for="quailification"
              id="qualification"
              placeholder="Enter Your Qualification"
              required
            />
            <label for="qualification" class="form-label fw-bold"
              >Qualification</label
            >
          </div>
          <div class="mb-3">
            <label for="address" class="form-label fw-bold">Address</label>
            <textarea
              class="form-control"
              id="address"
              rows="3"
              placeholder="Enter your address"
              required
            ></textarea>
            <div class="invalid-feedback">Please Enter your address.</div>
          </div>
          <div class="mb-3">
            <label for="upresume" class="form-label fw-bold"
              >Upload Resume</label
            >
            <input
              class="form-control"
              type="file"
              id="upresume"
              accept="pdf/*"
            />
            <div class="invalid-feedback">Please provide a Image File.</div>
          </div>
          <div class="mb-3">
            <label for="terms" class="form-label fw-bold"
              >Accept Terms and Conditions</label
            >
            <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                id="terms"
                required
              />
              <label class="form-check-label" for="terms">
                I agree to the terms and conditions
              </label>
            </div>
            <div class="invalid-feedback">
              Please accept the terms and conditions.
            </div>
          </div>
          <button type="submit" class="btn btn-dark">Register</button>
        </form>
      </div>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
