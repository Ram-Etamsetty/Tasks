<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="" style="background-color: rgba(145, 47, 22, 0.957)">
      <h2 class="display-4 text-center mb-4 text-light p-4">
        Student Dashboard
      </h2>
    </div>
    <div class="container mt-4">
      <div class="row g-3 mb-4">
        <div class="col-md-3">
          <div class="card text-center shadow">
            <div class="card-body">
              <h5>Total Students</h5>
              <h2>500</h2>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card text-center shadow">
            <div class="card-body">
              <h5>Present Students</h5>
              <h2 class="text-success">450</h2>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card text-center shadow">
            <div class="card-body">
              <h5>Absent Students</h5>
              <h2 class="text-danger">50</h2>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card text-center shadow">
            <div class="card-body">
              <h5>Placements</h5>
              <h2 class="text-primary">320</h2>
            </div>
          </div>
        </div>
      </div>

      <div class="mb-3">
        <input type="text" class="form-control" placeholder="Search Student" />
      </div>

      <div class="table-responsive">
        <table class="table table-bordered table-striped table-hover">
          <thead class="table-dark">
            <tr>
              <th>Roll No</th>
              <th>Name</th>
              <th>Branch</th>
              <th>Attendance</th>
            </tr>
          </thead>

          <tbody>
            <tr>
              <td>23B81A0569</td>
              <td>Krishna</td>
              <td>CSE</td>
              <td><span class="badge bg-success">Present</span></td>
            </tr>

            <tr>
              <td>23B81A0578</td>
              <td>Mahesh</td>
              <td>ECE</td>
              <td><span class="badge bg-danger">Absent</span></td>
            </tr>

            <tr>
              <td>23B81A0567</td>
              <td>Rajeev</td>
              <td>IT</td>
              <td><span class="badge bg-success">Present</span></td>
            </tr>

            <tr>
              <td>104</td>
              <td>Anjali</td>
              <td>CSE</td>
              <td><span class="badge bg-success">Present</span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </body>
</html>
