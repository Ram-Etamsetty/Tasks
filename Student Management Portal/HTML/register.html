<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../css/register.css" />
  </head>
  <body style="background-color: rgb(209, 214, 219)">
    <header
      class="d-flex align-items-center bg justify-content-center p-3"
      style="background-color: rgba(145, 47, 22, 0.957)"
    >
      <h1 class="display-4 text-light">Register</h1>
    </header>
    <main>
      <div class="container bg-light p-5 rounded" style="width: 50%">
        <form class="needs-validation">
          <div class="mb-3 form-floating">
            <input
              type="text"
              class="form-control"
              id="name"
              placeholder="Enter your name"
              required
            />
            <label for="name" class="form-label fw-bold">Name</label>
            <div class="invalid-feedback">Please Enter your name.</div>
          </div>
          <div class="mb-3 form-floating">
            <input
              type="text"
              class="form-control"
              id="rollNumber"
              placeholder="Enter your roll number"
              required
            />
            <label for="rollNumber" class="form-label fw-bold"
              >Roll Number</label
            >
            <div class="invalid-feedback">Please Enter your roll number.</div>
          </div>
          <div class="mb-3 form-floating">
            <input
              type="email"
              class="form-control"
              id="email"
              placeholder="Enter your email"
              required
            />
            <label for="email" class="form-label fw-bold">Email address</label>
          </div>
          <div class="mb-3 form-floating">
            <input
              type="tel"
              class="form-control"
              id="phno"
              placeholder="Enter your mobile number"
              required
            />
            <label for="phno" class="form-label fw-bold">Mobile Number</label>
            <div class="invalid-feedback">Please Enter your mobile number.</div>
          </div>
          <div class="mb-3 form-floating">
            <select class="form-control" id="gender" required>
              <option value="" disabled selected>Gender</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
            </select>
            <label for="gender" class="form-label fw-bold">Gender</label>
            <div class="invalid-feedback">Please Select your gender.</div>
          </div>
          <div class="mb-3 form-floating">
            <select class="form-control" id="branch" required>
              <option value="" disabled selected>Select Branch</option>
              <option value="cse">Computer Science and Engineering</option>
              <option value="ece">
                Electronics and Communication Engineering
              </option>
              <option value="mech">Mechanical Engineering</option>
              <option value="civil">Civil Engineering</option>
              <option value="eee">
                Electrical and Electronics Engineering
              </option>
            </select>
            <label for="branch" class="form-label fw-bold">Branch</label>
            <div class="invalid-feedback">Please Select your branch.</div>
          </div>
          <div class="mb-3">
            <label for="dob" class="form-label fw-bold">Date of Birth</label>
            <input
              type="date"
              class="form-control"
              id="dob"
              placeholder="Enter your date of birth"
              required
            />
            <div class="invalid-feedback">Please Enter your date of birth.</div>
          </div>
          <div class="mb-3">
            <label for="address" class="form-label fw-bold">Address</label>
            <textarea
              class="form-control"
              id="address"
              rows="3"
              placeholder="Enter your address"
              required
            ></textarea>
            <div class="invalid-feedback">Please Enter your address.</div>
          </div>
          <div class="mb-3">
            <label for="uplphoto" class="form-label fw-bold"
              >Upload Photo</label
            >
            <input
              class="form-control"
              type="file"
              id="uplphoto"
              accept="image/*"
            />
            <div class="invalid-feedback">Please provide a Image File.</div>
          </div>
          <div class="mb-3">
            <label for="terms" class="form-label fw-bold"
              >Accept Terms and Conditions</label
            >
            <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                id="terms"
                required
              />
              <label class="form-check-label" for="terms">
                I agree to the terms and conditions
              </label>
            </div>
            <div class="invalid-feedback">
              Please accept the terms and conditions.
            </div>
          </div>
          <button type="submit" class="btn btn-dark">Register</button>
        </form>
      </div>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
